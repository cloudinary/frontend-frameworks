name: Pull Request

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14.x'
          cache: 'npm'

      - name: Installing dependencies
        run: npm ci

      - name: Running tests
        run: npm run test

      - name: Running lint
        run: npm run lint

      - name: Running typecheck
        run: npm run typecheck

